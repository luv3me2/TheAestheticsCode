<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Style Picker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #2F3538;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 40px 0 20px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #000;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #222;
      text-align: center;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 15px 0;
    }

    .cat-btn {
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .cat-btn:hover {
      background: #2980b9;
    }

    .outfit {
      width: 90%;
      max-width: 360px;
      margin: 25px auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .outfit img {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      width: 90%;
      max-width: 360px;
    }

    .action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .like {
      background: #2ecc71;
      color: white;
    }

    .dislike {
      background: #e74c3c;
      color: white;
    }

    .links {
      margin-top: 20px;
      text-align: center;
      display: none;
    }

    .links a {
      display: block;
      margin: 10px 0;
      color: #3498db;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .category-title {
      font-size: 20px;
      margin: 15px 0;
      color: #2c3e50;
    }
  </style>
</head>
<body>

  <img src="https://via.placeholder.com/120/3498db/ffffff?text=LOGO" alt="Логотип" class="logo" id="logo"/>
  <h1 id="title">Выбери свой стиль</h1>

  <div class="categories" id="categories">
    <button class="cat-btn" data-cat="street">Street Style</button>
    <button class="cat-btn" data-cat="oldmoney">Old Money</button>
    <button class="cat-btn" data-cat="minimal">Minimalist</button>
    <button class="cat-btn" data-cat="business">Business</button>
    <button class="cat-btn" data-cat="casual">Casual</button>
  </div>

  <div id="app" style="display: none; width: 100%;">
    <div class="category-title" id="categoryTitle"></div>
    <img src="" alt="Outfit" class="outfit" id="outfitImg"/>
    
    <div class="actions">
      <button class="action-btn dislike" id="dislikeBtn">❌</button>
      <button class="action-btn like" id="likeBtn">❤️</button>
    </div>

    <div class="links" id="links">
      <div>Понравилось? Купи сейчас:</div>
      <a href="#" target="_blank" id="link1">Ссылка 1</a>
      <a href="#" target="_blank" id="link2">Ссылка 2</a>
    </div>
  </div>

  <script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram?.WebApp;
    tg.expand(); // Раскрыть на весь экран

    // Твой логотип (замени на свою ссылку)
    document.getElementById('logo').src = 'https://i.imgur.com/dY4gYtZ.png';

    const outfits = {
      street: [
        { img: 'https://via.placeholder.com/360x480/1abc9c/ffffff?text=Street+Style', links: ['https://example.com/street1', 'https://example.com/street2'] },
        { img: 'https://via.placeholder.com/360x480/3498db/ffffff?text=Urban+Look', links: ['https://example.com/street3', 'https://example.com/street4'] }
      ],
      oldmoney: [
        { img: 'https://via.placeholder.com/360x480/e74c3c/ffffff?text=Old+Money', links: ['https://example.com/old1', 'https://example.com/old2'] },
        { img: 'https://via.placeholder.com/360x480/f39c12/ffffff?text=Classic+Style', links: ['https://example.com/old3', 'https://example.com/old4'] }
      ],
      minimal: [
        { img: 'https://via.placeholder.com/360x480/9b59b6/ffffff?text=Minimal', links: ['https://example.com/min1', 'https://example.com/min2'] }
      ],
      business: [
        { img: 'https://via.placeholder.com/360x480/2c3e50/ffffff?text=Business', links: ['https://example.com/bus1', 'https://example.com/bus2'] }
      ],
      casual: [
        { img: 'https://via.placeholder.com/360x480/16a085/ffffff?text=Casual', links: ['https://example.com/cas1', 'https://example.com/cas2'] }
      ]
    };

    let currentOutfits = [];
    let currentIndex = 0;

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        currentOutfits = outfits[cat];
        currentIndex = 0;
        document.getElementById('categoryTitle').textContent = btn.textContent;
        document.getElementById('title').style.display = 'none';
        document.getElementById('categories').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        showOutfit();
      });
    });

    function showOutfit() {
      const outfit = currentOutfits[currentIndex];
      document.getElementById('outfitImg').src = outfit.img;
      document.getElementById('links').style.display = 'none';
    }

    document.getElementById('dislikeBtn').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % currentOutfits.length;
      document.getElementById('links').style.display = 'none';
      showOutfit();
    });

    document.getElementById('likeBtn').addEventListener('click', () => {
      const links = document.getElementById('links');
      const outfit = currentOutfits[currentIndex];
      document.getElementById('link1').href = outfit.links[0];
      document.getElementById('link2').href = outfit.links[1];
      links.style.display = 'block';
      tg.HapticFeedback.impactOccurred('light'); // Вибрация в телефоне
    });
  </script>

</body>
</html>
