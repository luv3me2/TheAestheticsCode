<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Style Picker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f8f9fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.5s ease;
    }

    .logo {
      width: 150px;
      height: 150px;
      margin: 60px 0 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #222;
      text-align: center;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 20px;
      max-width: 500px;
    }

    .cat-btn {
      padding: 12px 24px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }

    .cat-btn:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    .start-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4);
      transition: 0.3s;
    }

    .start-btn:hover {
      background: #c0392b;
      transform: scale(1.05);
    }

    .app {
      display: none;
      width: 100%;
      padding: 20px;
      align-items: center;
      flex-direction: column;
    }

    .outfit {
      width: 90%;
      max-width: 400px;
      margin: 30px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    .outfit img {
      width: 100%;
      height: auto;
      display: block;
    }

    .outfit:hover {
      transform: translateY(-5px);
    }

    .actions {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      width: 90%;
      max-width: 400px;
    }

    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .like {
      background: #2ecc71;
      color: white;
    }

    .dislike {
      background: #e74c3c;
      color: white;
    }

    .action-btn:hover {
      transform: scale(1.1);
    }

    .links {
      margin-top: 20px;
      text-align: center;
      display: none;
    }

    .links a {
      display: block;
      margin: 10px 0;
      color: #3498db;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .category-title {
      font-size: 22px;
      margin: 20px 0;
      color: #2c3e50;
    }
  </style>
</head>
<body>

  <!-- Логотип -->
  <img src="https://via.placeholder.com/150" alt="Логотип" class="logo" id="logo"/>

  <!-- Заголовок -->
  <h1 id="title">Выбери свой стиль</h1>

  <!-- Категории -->
  <div class="categories" id="categories">
    <button class="cat-btn" data-cat="street">Street Style</button>
    <button class="cat-btn" data-cat="oldmoney">Old Money</button>
    <button class="cat-btn" data-cat="minimal">Minimalist</button>
    <button class="cat-btn" data-cat="business">Business</button>
    <button class="cat-btn" data-cat="casual">Casual</button>
  </div>

  <!-- Кнопка "Начать" -->
  <button class="start-btn" id="startBtn">Начать</button>

  <!-- Основное приложение -->
  <div class="app" id="app">
    <div class="category-title" id="categoryTitle"></div>
    <img src="" alt="Outfit" class="outfit" id="outfitImg"/>
    
    <div class="actions">
      <button class="action-btn dislike" id="dislikeBtn">❌</button>
      <button class="action-btn like" id="likeBtn">❤️</button>
    </div>

    <div class="links" id="links">
      <div>Понравилось? Купи сейчас:</div>
      <a href="#" target="_blank" id="link1">Ссылка 1</a>
      <a href="#" target="_blank" id="link2">Ссылка 2</a>
    </div>
  </div>

  <script>
    // Ты можешь заменить это на свой логотип
    document.getElementById('logo').src = 'https://via.placeholder.com/150/3498db/ffffff?text=LOGO';

    const outfits = {
      street: [
        { img: 'https://via.placeholder.com/400x500/1abc9c/ffffff?text=Street+Style+1', links: ['https://example.com/street1', 'https://example.com/street2'] },
        { img: 'https://via.placeholder.com/400x500/3498db/ffffff?text=Street+Style+2', links: ['https://example.com/street3', 'https://example.com/street4'] }
      ],
      oldmoney: [
        { img: 'https://via.placeholder.com/400x500/e74c3c/ffffff?text=Old+Money+1', links: ['https://example.com/old1', 'https://example.com/old2'] },
        { img: 'https://via.placeholder.com/400x500/f39c12/ffffff?text=Old+Money+2', links: ['https://example.com/old3', 'https://example.com/old4'] }
      ],
      minimal: [
        { img: 'https://via.placeholder.com/400x500/9b59b6/ffffff?text=Minimal+1', links: ['https://example.com/min1', 'https://example.com/min2'] }
      ],
      business: [
        { img: 'https://via.placeholder.com/400x500/2c3e50/ffffff?text=Business+1', links: ['https://example.com/bus1', 'https://example.com/bus2'] }
      ],
      casual: [
        { img: 'https://via.placeholder.com/400x500/16a085/ffffff?text=Casual+1', links: ['https://example.com/cas1', 'https://example.com/cas2'] }
      ]
    };

    let currentOutfits = [];
    let currentIndex = 0;
    let currentCategory = '';

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('title').style.display = 'none';
      document.getElementById('categories').style.display = 'none';
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
    });

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCategory = btn.dataset.cat;
        currentOutfits = outfits[currentCategory];
        currentIndex = 0;
        document.getElementById('categoryTitle').textContent = btn.textContent;
        showOutfit();
      });
    });

    function showOutfit() {
      const outfit = currentOutfits[currentIndex];
      document.getElementById('outfitImg').src = outfit.img;
      document.getElementById('links').style.display = 'none';
    }

    document.getElementById('dislikeBtn').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % currentOutfits.length;
      document.getElementById('links').style.display = 'none';
      showOutfit();
    });

    document.getElementById('likeBtn').addEventListener('click', () => {
      const links = document.getElementById('links');
      const outfit = currentOutfits[currentIndex];
      document.getElementById('link1').href = outfit.links[0];
      document.getElementById('link2').href = outfit.links[1];
      links.style.display = 'block';
    });
  </script>

</body>
</html>
